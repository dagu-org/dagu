version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/persis/dagrunstore/postgres/queries"
    schema: "internal/persis/dagrunstore/postgres/migrations"
    gen:
      go:
        package: "db"
        out: "internal/persis/dagrunstore/postgres/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "dagu_uuid_v7"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "dagu_dag_name"
            go_type: "string"
          - db_type: "dagu_dag_run_id"
            go_type: "string"
          - db_type: "dagu_workspace_name"
            go_type: "string"

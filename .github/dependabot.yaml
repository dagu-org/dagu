version: 2
updates:
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: quarterly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: quarterly
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: quarterly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: quarterly
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: quarterly
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
  - package-ecosystem: npm
    directories:
      - docs
      - npm/*
      - ui
    schedule:
      interval: quarterly
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

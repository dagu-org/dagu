name: E2E CI

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "Makefile"
      - "proto/**"
      - "scripts/e2e/**"
      - "ui/**"
      - ".github/workflows/e2e-ci.yaml"
  pull_request:
    # Keep this workflow directly rerunnable from PR-only maintenance commits.
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "api/**"
      - "cmd/**"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "Makefile"
      - "proto/**"
      - "scripts/e2e/**"
      - "ui/**"
      - ".github/workflows/e2e-ci.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "20"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser E2E tests
        env:
          CI: "true"
          DAGU_LICENSE_PRIVKEY_B64: ${{ secrets.DAGU_LICENSE_PRIVKEY_B64 }}
        run: make test-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: ui/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: ui/test-results
          if-no-files-found: ignore
          retention-days: 7

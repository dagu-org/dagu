name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"
  pull_request:
    # Keep this workflow directly rerunnable from PR-only maintenance commits.
    types:
      - opened
      - reopened # new commits are pushed to the branch that the PR is based on
      - synchronize # new commits are pushed to the branch that the PR is based on
      - ready_for_review # PR is ready for review
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"

env:
  GO_VERSION: "1.26"

jobs:
  # Lint Go code
  golint:
    name: Go Linter
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting (go fmt)
        run: |
          go fmt ./...
          # Fail if formatting changed any files
          git diff --exit-code || (echo "Go files are not formatted. Please run 'make fmt'" && exit 1)

      - name: Check modernize (go fix)
        run: |
          diff=$(go fix -diff ./... 2>&1) || true
          if [ -n "$diff" ]; then
            echo "Go files need modernization. Please run 'make fmt'"
            echo "$diff"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0
          args: --timeout=10m

  test-ubuntu:
    name: Test on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          make bin

      - name: Test
        run: |
          make test-coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-windows:
    name: Test on windows-latest${{ matrix.name_suffix }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name_suffix: " (core-rest)"
            test_command: |
              go list ./... \
                | grep -vxE 'github.com/dagucloud/dagu/internal/(agent|intg($|/distr$|/queue$))' \
                | xargs go test -v -race
          - name_suffix: " (agent-api)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '^(Test(NewAPI|API_|FormatMessageWithContexts|FormatContextLine|SelectModel|GetUserIDFromContext|ShouldCompactMessages_|ShouldCancelStuckSession))' \
                ''
          - name_suffix: " (agent-runtime)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '^(Test(RequestCommandApprovalWithTimeout|AskUserRun.*|FormatUserResponse|BashTool_.*|ResolveTimeout|BuildOutput|TruncateOutput|DelegateTool_.*|FilterOutTool|Truncate$|Hooks_.*|TruncateUTF8Bytes_.*|BuildChatInputSpillWrapper_.*|NewLoop|Loop_.*|StartHeartbeatPump|NavigateTool_.*|PatchTool_.*|CountLines|IsDAGFile|ValidateIfDAGFile|ResolveToolPolicy_.*|ValidateToolPolicy|EvaluateBashPolicy|SplitShellCommandSegments|HasUnsupportedShellConstructs|GetModelPresets.*|ProviderCache_.*|HashLLMConfig_.*|CreateLLMProvider_.*|ReadTool_.*|FormatFileContent|TruncateResult|AppendRejectionSummary|RemoteURL|NewRemoteAgentTool_.*|NewListContextsTool_.*))' \
                ''
          - name_suffix: " (agent-session)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '' \
                '^(Test(NewAPI|API_|FormatMessageWithContexts|FormatContextLine|SelectModel|GetUserIDFromContext|ShouldCompactMessages_|ShouldCancelStuckSession|RequestCommandApprovalWithTimeout|AskUserRun.*|FormatUserResponse|BashTool_.*|ResolveTimeout|BuildOutput|TruncateOutput|DelegateTool_.*|FilterOutTool|Truncate$|Hooks_.*|TruncateUTF8Bytes_.*|BuildChatInputSpillWrapper_.*|NewLoop|Loop_.*|StartHeartbeatPump|NavigateTool_.*|PatchTool_.*|CountLines|IsDAGFile|ValidateIfDAGFile|ResolveToolPolicy_.*|ValidateToolPolicy|EvaluateBashPolicy|SplitShellCommandSegments|HasUnsupportedShellConstructs|GetModelPresets.*|ProviderCache_.*|HashLLMConfig_.*|CreateLLMProvider_.*|ReadTool_.*|FormatFileContent|TruncateResult|AppendRejectionSummary|RemoteURL|NewRemoteAgentTool_.*|NewListContextsTool_.*))'
          - name_suffix: " (intg-approval-history)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(TestWaitStepApproval|TestApprovalField|TestHistoryCommand_)' \
                ''
          - name_suffix: " (intg-infra)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|JQExecutor|MailConfigEnvExpansion|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|ShellExecution|SQLExecutor_.*|Server_.*|SSHExecutorIntegration|Router.*|TemplateExecutor|WebhookPayloadEnv|WorkingDirectoryResolution))' \
                ''
          - name_suffix: " (intg-rest)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|JQExecutor|MailConfigEnvExpansion|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|ShellExecution|SQLExecutor_.*|Server_.*|SSHExecutorIntegration|Router.*|TemplateExecutor|WebhookPayloadEnv|WorkingDirectoryResolution))'
          - name_suffix: " (intg-distr-execution)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(BaseConfig_|Coordinator_|Execution_(StatusPushing|LogStreaming|LargeOutput|StartCommand|TagsPropagation|SharedFSMode|WorkDir|QueueLifecycle|QueuedCatchupHappyPath)))' \
                ''
          - name_suffix: " (intg-distr-retry-cancel)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(Cancellation_|Retry_|OneOffScheduleRunsDistributed))' \
                ''
          - name_suffix: " (intg-distr-dispatch)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(Execution_ProcHeartbeat_.*|Execution_QueuedDispatch_.*|Parallel_.*|Params_.*))' \
                ''
          - name_suffix: " (intg-distr-rest)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '' \
                '^(Test(BaseConfig_|Coordinator_|Execution_(StatusPushing|LogStreaming|LargeOutput|StartCommand|TagsPropagation|SharedFSMode|WorkDir|QueueLifecycle|QueuedCatchupHappyPath)|Cancellation_|Retry_|OneOffScheduleRunsDistributed|Execution_ProcHeartbeat_.*|Execution_QueuedDispatch_.*|Parallel_.*|Params_.*))'
          - name_suffix: " (intg-queue)"
            test_command: go test -v -race ./internal/intg/queue
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build (Windows)
        run: |
          go build -o .\.local\bin\dagu.exe .\cmd

      - name: Test (Windows)
        shell: bash
        run: |
          chmod +x ./scripts/test-shard.sh
          ${{ matrix.test_command }}

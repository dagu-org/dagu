name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"
  pull_request:
    # Keep this workflow directly rerunnable from PR-only maintenance commits.
    types:
      - opened
      - reopened # new commits are pushed to the branch that the PR is based on
      - synchronize # new commits are pushed to the branch that the PR is based on
      - ready_for_review # PR is ready for review
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"

env:
  GO_VERSION: "1.26"

jobs:
  # Lint Go code
  golint:
    name: Go Linter
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting (go fmt)
        run: |
          go fmt ./...
          # Fail if formatting changed any files
          git diff --exit-code || (echo "Go files are not formatted. Please run 'make fmt'" && exit 1)

      - name: Check modernize (go fix)
        run: |
          diff=$(go fix -diff ./... 2>&1) || true
          if [ -n "$diff" ]; then
            echo "Go files need modernization. Please run 'make fmt'"
            echo "$diff"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0
          args: --timeout=10m

  test-ubuntu:
    name: Test on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          make bin

      - name: Test
        run: |
          make test-coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-windows:
    name: Test on windows-latest${{ matrix.name_suffix }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name_suffix: " (core-cmd-start)"
            test_command: |
              ./scripts/test-core-cmd-start-shards.sh
          - name_suffix: " (core-cmd-status)"
            test_command: |
              ./scripts/test-cmd-rest-shards.sh status
          - name_suffix: " (core-cmd-rest)"
            test_command: |
              ./scripts/test-cmd-rest-shards.sh rest
          - name_suffix: " (core-packages-a)"
            test_command: |
              ./scripts/test-core-package-shards.sh a
          - name_suffix: " (core-packages-b)"
            test_command: |
              ./scripts/test-core-package-shards.sh b
          - name_suffix: " (core-packages-c)"
            test_command: |
              ./scripts/test-core-package-shards.sh c
          - name_suffix: " (core-runtime-base-a-early)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-a-early
          - name_suffix: " (core-runtime-base-a-rest)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-a-rest
          - name_suffix: " (core-runtime-base-a-retry-output)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-a-retry-output
          - name_suffix: " (core-runtime-base-b-policies-advanced)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-b-policies-advanced
          - name_suffix: " (core-runtime-base-b-agent)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-b-agent
          - name_suffix: " (core-runtime-base-b-refs-chatwait)"
            test_command: |
              ./scripts/test-runtime-shards.sh base-b-refs
          - name_suffix: " (core-service-api)"
            test_command: |
              ./scripts/test-service-api-windows.sh
          - name_suffix: " (core-service-and-agent)"
            test_command: |
              ./scripts/test-service-and-agent-windows.sh
          - name_suffix: " (intg-general)"
            test_command: |
              ./scripts/test-intg-group-shards.sh general
          - name_suffix: " (intg-service-docker)"
            test_command: |
              ./scripts/test-intg-group-shards.sh service-docker
          - name_suffix: " (intg-data-subdag)"
            test_command: |
              ./scripts/test-intg-group-shards.sh data-subdag
          - name_suffix: " (intg-parallel-core)"
            test_command: |
              ./scripts/test-intg-parallel-windows.sh core
          - name_suffix: " (intg-parallel-extras)"
            test_command: |
              ./scripts/test-intg-parallel-windows.sh extras
          - name_suffix: " (intg-rest-a-m)"
            test_command: |
              ./scripts/test-intg-rest-a-m-windows.sh
          - name_suffix: " (intg-rest-n-r)"
            test_command: |
              ./scripts/test-shard-split.sh ./internal/intg 5 \
                '^Test([N-R].*)' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration|RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation|Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv|JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution|CallSubDAG|NestedThreeLevelDAG|LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation|Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*|ParallelExecution_.*|Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))'
          - name_suffix: " (intg-rest-s)"
            test_command: |
              TEST_GO_PARALLEL=1 ./scripts/test-shard-split.sh ./internal/intg 5 \
                '^Test(S.*)' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration|RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation|Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv|JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution|CallSubDAG|NestedThreeLevelDAG|LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation|Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*|ParallelExecution_.*|Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))'
          - name_suffix: " (intg-rest-t-z)"
            test_command: |
              TEST_GO_PARALLEL=2 ./scripts/test-shard-split.sh ./internal/intg 4 \
                '^Test([T-Z].*)' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration|RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation|Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv|JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution|CallSubDAG|NestedThreeLevelDAG|LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation|Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*|ParallelExecution_.*|Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))'
          - name_suffix: " (intg-distr-a-core)"
            test_command: |
              ./scripts/test-intg-distr-shards.sh a-core
          - name_suffix: " (intg-distr-a-retry)"
            test_command: |
              ./scripts/test-intg-distr-shards.sh a-retry
          - name_suffix: " (intg-distr-b)"
            test_command: |
              ./scripts/test-intg-distr-shards.sh b
          - name_suffix: " (intg-distr-c)"
            test_command: |
              TEST_GO_PARALLEL=1 ./scripts/test-shard-split.sh ./internal/intg/distr 1 \
                '^(Test(CustomStepTypes_.*|SubDAG_.*|DistributedRun_.*))' \
                ''
          - name_suffix: " (intg-distr-heavy)"
            test_command: |
              TEST_GO_PARALLEL=1 ./scripts/test-shard-split.sh ./internal/intg/distr 1 \
                '^TestExecution_QueuedDispatch_ConsumesOneThousandItems$' \
                ''
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build (Windows)
        shell: bash
        run: |
          mkdir -p ./.local/bin
          go build -o ./.local/bin/dagu.exe ./cmd

      - name: Test (Windows)
        shell: bash
        run: |
          chmod +x ./scripts/test-shard.sh
          chmod +x ./scripts/test-shard-split.sh
          chmod +x ./scripts/test-package-shard.sh
          chmod +x ./scripts/test-core-cmd-start-shards.sh
          chmod +x ./scripts/test-cmd-rest-shards.sh
          chmod +x ./scripts/test-agent-shards.sh
          chmod +x ./scripts/test-core-package-shards.sh
          chmod +x ./scripts/test-intg-group-shards.sh
          chmod +x ./scripts/test-intg-parallel-windows.sh
          chmod +x ./scripts/test-intg-rest-a-m-windows.sh
          chmod +x ./scripts/test-intg-distr-shards.sh
          chmod +x ./scripts/test-runtime-shards.sh
          ${{ matrix.test_command }}

name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"
  pull_request:
    # Keep this workflow directly rerunnable from PR-only maintenance commits.
    types:
      - opened
      - reopened # new commits are pushed to the branch that the PR is based on
      - synchronize # new commits are pushed to the branch that the PR is based on
      - ready_for_review # PR is ready for review
    paths:
      - "*.go"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci.yaml"

env:
  GO_VERSION: "1.26"

jobs:
  # Lint Go code
  golint:
    name: Go Linter
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check formatting (go fmt)
        run: |
          go fmt ./...
          # Fail if formatting changed any files
          git diff --exit-code || (echo "Go files are not formatted. Please run 'make fmt'" && exit 1)

      - name: Check modernize (go fix)
        run: |
          diff=$(go fix -diff ./... 2>&1) || true
          if [ -n "$diff" ]; then
            echo "Go files need modernization. Please run 'make fmt'"
            echo "$diff"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.9.0
          args: --timeout=10m

  test-ubuntu:
    name: Test on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          make bin

      - name: Test
        run: |
          make test-coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-windows:
    name: Test on windows-latest${{ matrix.name_suffix }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name_suffix: " (core-entrypoints)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/(api/v1|proto/coordinator/v1|proto/index/v1|skills)$|^github.com/dagucloud/dagu/internal/(agent/schema|agentoauth|agentsnapshot|auth($|/tokensecret$)|clicontext|license|output|proto/convert|remotenode|test($|util$)|tunnel|upgrade|workspace)$'
          - name_suffix: " (core-cmd-start-positional)"
            test_command: |
              ./scripts/test-shard.sh ./internal/cmd \
                '^(TestCmdStart_PositionalParamValidation)$' \
                ''
          - name_suffix: " (core-cmd-start-other)"
            test_command: |
              ./scripts/test-shard.sh ./internal/cmd \
                '^(Test(StartCommand|StartCommand_BuiltExecutablePreservesExplicitEnv|CmdStart_.*))' \
                '^(TestCmdStart_PositionalParamValidation)$'
          - name_suffix: " (core-cmd-rest)"
            test_command: |
              ./scripts/test-cmd-rest-shards.sh
          - name_suffix: " (core-cmn)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/cmn(/|$)'
          - name_suffix: " (core-core-llm)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/(core(/|$)|gitsync$|llm(/|$))'
          - name_suffix: " (core-persis)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/persis(/|$)'
          - name_suffix: " (core-runtime-base)"
            test_command: |
              ./scripts/test-runtime-shards.sh
          - name_suffix: " (core-runtime-subpackages)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/runtime/(agent|executor|remote|transform)$'
          - name_suffix: " (core-runtime-builtin)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/runtime/builtin(/|$)'
          - name_suffix: " (core-service-api)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/service/frontend/api/v1$'
          - name_suffix: " (core-service-terminal)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/service/frontend/terminal$'
          - name_suffix: " (core-service)"
            test_command: |
              ./scripts/test-package-shard.sh \
                '^github.com/dagucloud/dagu/internal/service(/|$)' \
                '^github.com/dagucloud/dagu/internal/service/frontend/(api/v1|terminal)$'
          - name_suffix: " (agent-api)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '^(Test(NewAPI|API_|FormatMessageWithContexts|FormatContextLine|SelectModel|GetUserIDFromContext|ShouldCompactMessages_|ShouldCancelStuckSession))' \
                ''
          - name_suffix: " (agent-runtime)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '^(Test(RequestCommandApprovalWithTimeout|AskUserRun.*|FormatUserResponse|BashTool_.*|ResolveTimeout|BuildOutput|TruncateOutput|DelegateTool_.*|FilterOutTool|Truncate$|Hooks_.*|TruncateUTF8Bytes_.*|BuildChatInputSpillWrapper_.*|NewLoop|Loop_.*|StartHeartbeatPump|NavigateTool_.*|PatchTool_.*|CountLines|IsDAGFile|ValidateIfDAGFile|ResolveToolPolicy_.*|ValidateToolPolicy|EvaluateBashPolicy|SplitShellCommandSegments|HasUnsupportedShellConstructs|GetModelPresets.*|ProviderCache_.*|HashLLMConfig_.*|CreateLLMProvider_.*|ReadTool_.*|FormatFileContent|TruncateResult|AppendRejectionSummary|RemoteURL|NewRemoteAgentTool_.*|NewListContextsTool_.*))' \
                ''
          - name_suffix: " (agent-session)"
            test_command: |
              ./scripts/test-shard.sh ./internal/agent \
                '' \
                '^(Test(NewAPI|API_|FormatMessageWithContexts|FormatContextLine|SelectModel|GetUserIDFromContext|ShouldCompactMessages_|ShouldCancelStuckSession|RequestCommandApprovalWithTimeout|AskUserRun.*|FormatUserResponse|BashTool_.*|ResolveTimeout|BuildOutput|TruncateOutput|DelegateTool_.*|FilterOutTool|Truncate$|Hooks_.*|TruncateUTF8Bytes_.*|BuildChatInputSpillWrapper_.*|NewLoop|Loop_.*|StartHeartbeatPump|NavigateTool_.*|PatchTool_.*|CountLines|IsDAGFile|ValidateIfDAGFile|ResolveToolPolicy_.*|ValidateToolPolicy|EvaluateBashPolicy|SplitShellCommandSegments|HasUnsupportedShellConstructs|GetModelPresets.*|ProviderCache_.*|HashLLMConfig_.*|CreateLLMProvider_.*|ReadTool_.*|FormatFileContent|TruncateResult|AppendRejectionSummary|RemoteURL|NewRemoteAgentTool_.*|NewListContextsTool_.*))'
          - name_suffix: " (intg-approval)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(WaitStepApproval|ApprovalField))' \
                ''
          - name_suffix: " (intg-history)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(TestHistoryCommand_)' \
                ''
          - name_suffix: " (intg-docker-storage)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration))' \
                ''
          - name_suffix: " (intg-router)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation))' \
                ''
          - name_suffix: " (intg-server-notify)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv))' \
                ''
          - name_suffix: " (intg-data-shell)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution))' \
                ''
          - name_suffix: " (intg-subdag)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(CallSubDAG|NestedThreeLevelDAG|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation))' \
                ''
          - name_suffix: " (intg-output)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*))' \
                ''
          - name_suffix: " (intg-params)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*))' \
                ''
          - name_suffix: " (intg-parallel-core)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(ParallelExecution_.*))' \
                ''
          - name_suffix: " (intg-parallel-issues)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^(Test(Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))' \
                ''
          - name_suffix: " (intg-rest-a-m)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^Test([A-M].*)' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration|RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation|Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv|JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution|CallSubDAG|NestedThreeLevelDAG|LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation|Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*|ParallelExecution_.*|Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))'
          - name_suffix: " (intg-rest-n-z)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg \
                '^Test([N-Z].*)' \
                '^(Test(WaitStepApproval|ApprovalField|HistoryCommand_|DockerExecutor(_.*)?|DAGLevelContainer|StepLevelContainer|Container.*|DAGLevelRedis|MinIOContainer_.*|SFTPExecutorIntegration|SSHExecutorIntegration|RouterExecutor|RouterComplexScenarios|RouterStepStatus|RouterValidation|Server_.*|MailConfigEnvExpansion|WebhookPayloadEnv|JQExecutor|ShellExecution|SQLExecutor_.*|TemplateExecutor|WorkingDirectoryResolution|CallSubDAG|NestedThreeLevelDAG|LargeOutput_128KB|OutputsCollection(_.*)?|OutputValidation_.*|ParamValidation_.*|NoSchema_NoRegression|FullPipeline_ParamAndOutputValidation|Params_.*|InlineParams_.*|Issue1182_.*|Issue1252_.*|ParallelExecution_.*|Issue1274_.*|Issue1658_.*|Issue1790_ParallelCallPathItemResolution))'
          - name_suffix: " (intg-distr-baseconfig-status)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(BaseConfig_.*|Coordinator_.*|Execution_(StatusPushing|LogStreaming|LargeOutput)))' \
                ''
          - name_suffix: " (intg-distr-direct-queue)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(TestExecution_(StartCommand|TagsPropagation|SharedFSMode|WorkDir|QueueLifecycle|QueuedCatchupHappyPath))' \
                ''
          - name_suffix: " (intg-distr-retry-cancel)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(Cancellation_.*|Retry_.*|OneOffScheduleRunsDistributed))' \
                ''
          - name_suffix: " (intg-distr-parallel-params)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(Parallel_.*|Params_.*))' \
                ''
          - name_suffix: " (intg-distr-proc-heartbeat)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(TestExecution_ProcHeartbeat_.*)' \
                ''
          - name_suffix: " (intg-distr-queued-dispatch)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(TestExecution_QueuedDispatch_(RecoversWhenWorkerRegistersLater|RecoversWhenMatchingWorkerRegistersLater))' \
                ''
          - name_suffix: " (intg-distr-queued-dispatch-heavy)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(TestExecution_QueuedDispatch_ConsumesOneThousandItems)' \
                ''
          - name_suffix: " (intg-distr-rest)"
            test_command: |
              ./scripts/test-shard.sh ./internal/intg/distr \
                '^(Test(CustomStepTypes_.*|SubDAG_.*|DistributedRun_.*))' \
                ''
          - name_suffix: " (intg-queue)"
            test_command: go test -v -race ./internal/intg/queue
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build (Windows)
        run: |
          go build -o .\.local\bin\dagu.exe .\cmd

      - name: Test (Windows)
        shell: bash
        run: |
          chmod +x ./scripts/test-shard.sh
          chmod +x ./scripts/test-package-shard.sh
          chmod +x ./scripts/test-cmd-rest-shards.sh
          chmod +x ./scripts/test-runtime-shards.sh
          ${{ matrix.test_command }}

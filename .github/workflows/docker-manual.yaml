name: DockerImage Manual

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (e.g. v1.16.9 or main)"
        required: true
        type: string

jobs:
  docker-default:
    name: Build and push default image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          case "$REF" in
            refs/tags/v*) VERSION="${REF#refs/tags/v}" ;;
            v*)           VERSION="${REF#v}" ;;
            refs/tags/*)  VERSION="${REF#refs/tags/}" ;;
            *)            VERSION="${REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}

  docker-dev:
    name: Build and push dev image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          case "$REF" in
            refs/tags/v*) VERSION="${REF#refs/tags/v}" ;;
            v*)           VERSION="${REF#v}" ;;
            refs/tags/*)  VERSION="${REF#refs/tags/}" ;;
            *)            VERSION="${REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}-dev

  docker-alpine:
    name: Build and push alpine image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        run: |
          REF="${{ inputs.ref }}"
          case "$REF" in
            refs/tags/v*) VERSION="${REF#refs/tags/v}" ;;
            v*)           VERSION="${REF#v}" ;;
            refs/tags/*)  VERSION="${REF#refs/tags/}" ;;
            *)            VERSION="${REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:alpine
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}-alpine

name: DockerImage Manual

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (e.g. v1.16.9 or main)"
        required: true
        type: string

jobs:
  # Validate the user-supplied ref before any job that pushes images or uses secrets.
  # A ref containing shell metacharacters could otherwise be injected into the
  # "Resolve version" run step via ${{ inputs.ref }}.
  validate-inputs:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Validate ref input
        env:
          # Pass via env so the value is treated as data, not interpolated code.
          INPUT_REF: ${{ inputs.ref }}
        run: |
          # Reject refs containing shell metacharacters (space, ;, &, |, $, (, ), `, <, >, !).
          if echo "$INPUT_REF" | grep -qE '[[:space:];|&$`()<>!]'; then
            echo "::error::inputs.ref contains invalid characters: ${INPUT_REF}"
            exit 1
          fi
          if [ -z "$INPUT_REF" ]; then
            echo "::error::inputs.ref must not be empty"
            exit 1
          fi

  docker-default:
    name: Build and push default image
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        env:
          # Pass inputs.ref via env so it's treated as a plain string in the shell,
          # not code. Writing ${{ inputs.ref }} directly inside `run:` would let a
          # crafted ref value execute arbitrary commands.
          INPUT_REF: ${{ inputs.ref }}
        run: |
          case "$INPUT_REF" in
            refs/tags/v*) VERSION="${INPUT_REF#refs/tags/v}" ;;
            v*)           VERSION="${INPUT_REF#v}" ;;
            refs/tags/*)  VERSION="${INPUT_REF#refs/tags/}" ;;
            *)            VERSION="${INPUT_REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}

  docker-dev:
    name: Build and push dev image
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        env:
          # Pass inputs.ref via env — same injection-prevention rationale as docker-default.
          INPUT_REF: ${{ inputs.ref }}
        run: |
          case "$INPUT_REF" in
            refs/tags/v*) VERSION="${INPUT_REF#refs/tags/v}" ;;
            v*)           VERSION="${INPUT_REF#v}" ;;
            refs/tags/*)  VERSION="${INPUT_REF#refs/tags/}" ;;
            *)            VERSION="${INPUT_REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:dev
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}-dev

  docker-alpine:
    name: Build and push alpine image
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DAGU_GITHUB_TOKEN }}

      - name: Resolve version
        id: get_version
        shell: bash
        env:
          # Pass inputs.ref via env — same injection-prevention rationale as docker-default.
          INPUT_REF: ${{ inputs.ref }}
        run: |
          case "$INPUT_REF" in
            refs/tags/v*) VERSION="${INPUT_REF#refs/tags/v}" ;;
            v*)           VERSION="${INPUT_REF#v}" ;;
            refs/tags/*)  VERSION="${INPUT_REF#refs/tags/}" ;;
            *)            VERSION="${INPUT_REF}" ;;
          esac
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            LDFLAGS=-X 'main.version=${{ env.VERSION }}'
          tags: |
            ghcr.io/${{ github.repository }}:alpine
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}-alpine
